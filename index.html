<style>

  body {

    min-height: 100vh;

  .fade-in { animation: fadeIn 0.3s ease-out forwards; }

  .pixel-border {
    position: relative;
    border: 2px solid #475569;
    background: #0f172a;
  }
  
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKyot66D6v2RLOts2qgFD0JAwin7undac",
    authDomain: "taoyuan-impact.firebaseapp.com",
    projectId: "taoyuan-impact",
    storageBucket: "taoyuan-impact.firebasestorage.app",
    messagingSenderId: "304231338614",
    appId: "1:304231338614:web:d3eaf1e19699f67c0f8557"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToFirebase = async (data) => {
    try {
      await addDoc(collection(db, "quests"), data);
    } catch (error) {
      console.error(error);
    }
  };
</script>

  const results = {

      partner: "culture"
    },
    eco: {
      class: "埤塘生態德魯伊", title: "Lv.1 守護的生態德魯伊", attr: "自然 / 守護 / 孕育",
      stats: { str: 45, agi: 60, int: 85, focus: 90 },
      description: "你與土地有著深刻連結，總能將生活苦澀轉化為回甘智慧。前往桃園埤塘，尋找能治癒隊友自然靈藥吧！",
      action: "接取任務：前往八德埤塘生態公園進行導覽",
      style: "card-glow-eco text-lime-400", btn: "bg-lime-700 hover:bg-lime-600",
      barColor: "bg-lime-400",
      imgUrl: "assets/images/eco-druid.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=三峽老街+茶行",
      partner: "community"
    }
  };

  const bgmAudios = {
    culture: new Audio('assets/audio/culture.mp3'),
    circular: new Audio('assets/audio/circular.mp3'),
    community: new Audio('assets/audio/community.mp3'),
    tech: new Audio('assets/audio/tech.mp3'),
    eco: new Audio('assets/audio/eco.mp3')
  };
  
  Object.values(bgmAudios).forEach(audio => audio.loop = true);

  let step = 0;
  let scores = { culture: 0, circular: 0, community: 0, tech: 0, eco: 0 };
  let finalResult = null;
  let isMuted = false;
  let audioUnlocked = false;
  let calcInterval = null;
  let isProcessing = false;

  let userData = {
    userId: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2),
    answers: [],
    result: null,
    timestamp: null
  };

  function showToast(msg) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'bg-amber-500 text-slate-900 px-5 py-3 rounded shadow-xl font-bold text-sm tracking-widest fade-in border border-amber-300 pointer-events-auto';
    toast.innerHTML = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(-10px)';
      toast.style.transition = 'all 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    Object.values(bgmAudios).forEach(audio => {
      audio.volume = 0;
      audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 1;
      }).catch(() => {});
    });
    audioUnlocked = true;
  }

  function toggleMute() {
    isMuted = !isMuted;
    const btnIcon = document.getElementById('mute-icon');
    
    if (isMuted) {
      Object.values(bgmAudios).forEach(audio => audio.pause());
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
    } else {
      if (finalResult && step > questions.length && bgmAudios[finalResult]) {
        bgmAudios[finalResult].play().catch(() => {});
      }
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>`;
    }
  }

  function playSound(type) {
    Object.values(bgmAudios).forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });
    if (bgmAudios[type] && !isMuted) {
      bgmAudios[type].play().catch(() => {});
    }
  }

  function showModal(title, desc, confirmCallback) {
    const modal = document.getElementById('custom-modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    modal.classList.remove('hidden');
    
    document.getElementById('modal-confirm').onclick = () => {
      modal.classList.add('hidden');
      confirmCallback();
    };
    document.getElementById('modal-cancel').onclick = () => {
      modal.classList.add('hidden');
      history.pushState(null, '', window.location.href);
    };
  }

  window.addEventListener('popstate', (e) => {
    if (step > 0 && step <= questions.length) {
      showModal('確定終止尋蹤嗎？', '目前同步進度將會遺失。', () => {
        step = 0;
        userData.answers = [];
        scores = { culture: 0, circular: 0, community: 0, tech: 0, eco: 0 };
        render();
      });
    } else {
      history.pushState(null, '', window.location.href);
    }
  });

  function handleStart() {
    unlockAudio();
    history.pushState(null, '', window.location.href);
    const app = document.getElementById('app');
    window.scrollTo(0, 0);
    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center p-6 text-center fade-in w-full max-w-md mx-auto">
        <div class="text-amber-500 mb-6 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="m17 5-5-3-5 3v14l5 3 5-3z"/></svg>
        </div>
        <h2 class="text-xl font-bold tracking-widest text-slate-200 mb-2">踏入探索結界</h2>
        <p class="text-slate-500 text-sm">正在同步時空軌跡...</p>
      </div>
    `;
    
    setTimeout(() => {
      step = 1;
      userData.answers = [];
      scores = { culture: 0, circular: 0, community: 0, tech: 0, eco: 0 };
      render();
    }, 1500);
  }

  function handleAnswer(type) {
    if (isProcessing) return;
    isProcessing = true;
    scores[type]++;
    userData.answers.push(type);
    
    if (step < questions.length) {
      step++;
      render();
      setTimeout(() => { isProcessing = false; }, 300);
    } else {
      calculateResult();
    }
  }

  function calculateResult() {
    let maxScore = -1;
    let possibleTypes = [];
    
    ['culture', 'circular', 'community', 'tech', 'eco'].forEach(type => {
      if (scores[type] > maxScore) {
        maxScore = scores[type];
        possibleTypes = [type];
      } else if (scores[type] === maxScore) {
        possibleTypes.push(type);
      }
    });

    finalResult = possibleTypes[Math.floor(Math.random() * possibleTypes.length)];
    userData.result = results[finalResult].class;
    userData.timestamp = new Date().toISOString();
    
    if (window.saveToFirebase) {
      window.saveToFirebase(userData);
    }
    
    step = questions.length + 1;
    renderCalculating();
    
    setTimeout(() => {
      if (calcInterval) clearInterval(calcInterval);
      renderResult();
      playSound(finalResult);
      isProcessing = false;
    }, 2500);
  }

  function downloadCard() {
    const btn = document.getElementById('download-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 靈魂結印中...`;

    const cardWrap = document.getElementById('character-card-export-wrap');

    document.fonts.ready.then(() => {
      setTimeout(() => {
        html2canvas(cardWrap, {
          scale: 2,
          backgroundColor: '#0f172a',
          useCORS: true,
          logging: false
        }).then(canvas => {
          const link = document.createElement('a');
          link.download = `桃園尋跡_${results[finalResult].class}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          btn.innerHTML = originalText;
        }).catch(err => {
          btn.innerHTML = originalText;
          showToast('下載失敗，請稍後再試。');
        });
      }, 300);
    });
  }

  function generateShareLink() {
    const baseUrl = window.location.href.split('?')[0];
    const needType = results[finalResult].partner;
    const shareUrl = `${baseUrl}?need=${needType}`;
    
    if (navigator.share) {
      navigator.share({ title: '桃園尋跡社創魂覺醒', url: shareUrl }).catch(() => {});
    } else {
      const el = document.createElement('textarea');
      el.value = shareUrl;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      showToast('成功複製專屬招募連結！');
    }
  }

          喚醒你的社創屬性，開啟桃園專屬任務。

          <h1 class="text-3xl sm:text-4xl font-black text-slate-100 mb-2 leading-tight">

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>

        <div class="mt-8 text-xs text-slate-600 tracking-widest pb-4">
          © 2026 IMPACT STAR 
        </div>
      </div>
    `;
  }

  function renderQuestion() {
    window.scrollTo(0, 0);
    const app = document.getElementById('app');
    const q = questions[step - 1];
    
    let optionsHtml = q.options.map(opt => `
      <button onclick="handleAnswer('${opt.type}')" class="text-left w-full p-4 bg-slate-800 border border-slate-700 hover:border-amber-500 active:border-amber-500 transition-all active:scale-[0.98] group relative overflow-hidden rounded-md outline-none flex items-start">
        <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <div class="flex-shrink-0 mt-0.5 mr-3 relative z-10">
          <svg class="w-4 h-4 text-slate-500 group-hover:text-amber-500 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
        <span class="text-slate-300 font-medium leading-relaxed group-hover:text-amber-400 relative z-10 flex-1">
          ${opt.text}
        </span>
      </button>
    `).join('');

    app.innerHTML = `
      <div class="flex-1 flex flex-col p-4 sm:p-6 fade-in w-full max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-4 pt-4 border-b border-slate-800 pb-4 shrink-0">
          <span class="text-sm font-bold text-amber-500 tracking-widest">STAGE ${step} / ${questions.length}</span>
          <div class="flex gap-1">
            ${Array.from({length: questions.length}).map((_, i) => `<div class="h-1.5 sm:h-1 w-3 sm:w-4 rounded-sm sm:rounded-none ${i < step ? 'bg-amber-500' : 'bg-slate-800'}"></div>`).join('')}
          </div>
        </div>
        
        <div class="flex-1 flex flex-col justify-start pt-2 pb-8">
          <div class="pixel-border p-5 sm:p-6 mb-6 relative bg-slate-900/90 backdrop-blur-sm">
            <div class="absolute -top-3 -left-3 w-6 h-6 border-t-2 border-l-2 border-amber-500"></div>
            <div class="absolute -bottom-3 -right-3 w-6 h-6 border-b-2 border-r-2 border-amber-500"></div>
            <h2 class="text-lg sm:text-xl font-bold text-slate-100 leading-relaxed">${q.title}</h2>
          </div>
          <div class="flex flex-col gap-3 sm:gap-4">
            ${optionsHtml}
          </div>
        </div>
      </div>
    `;
  }

  function renderCalculating() {
    window.scrollTo(0, 0);
    const app = document.getElementById('app');
    const flavorTexts = ["讀取靈魂碎片...", "共鳴在地頻率...", "凝聚社創精神...", "鑄造專屬憑證..."];
    let textIdx = 0;
    
    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center p-6 text-center fade-in w-full max-w-md mx-auto">
        <div class="w-16 h-16 border-4 border-slate-700 border-t-amber-500 rounded-full animate-spin mb-8"></div>
        <h2 class="text-xl font-bold tracking-widest text-slate-200 mb-3">正在分析靈魂屬性</h2>
        <p id="calc-text" class="text-amber-500 text-sm tracking-widest font-bold h-5">${flavorTexts[0]}</p>
      </div>
    `;

    calcInterval = setInterval(() => {
      textIdx = (textIdx + 1) % flavorTexts.length;
      const el = document.getElementById('calc-text');
      if(el) el.innerText = flavorTexts[textIdx];
    }, 600);
  }

  function renderResult() {
    window.scrollTo(0, 0);
    const res = results[finalResult];
    const partnerRes = results[res.partner];
    const app = document.getElementById('app');
    
    const statBar = (label, val, colorClass) => `

        </div>
        <span class="text-slate-300 w-6 text-right flex-shrink-0">${val}</span>
      </div>
    `;

    app.innerHTML = `
      <div class="flex-1 py-8 sm:py-10 px-4 fade-in flex flex-col items-center w-full mx-auto">
        <p class="text-slate-400 text-xs tracking-widest mb-4">CHARACTER UNLOCKED</p>
        
        <div id="character-card-export-wrap" class="w-full bg-slate-950 p-2 sm:p-4 mb-4 flex justify-center" style="max-width: 400px;">

            <div class="w-full aspect-[16/9] sm:h-48 bg-slate-800 relative flex items-center justify-center border border-slate-700/50 mb-4 overflow-hidden rounded-t-md">

                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent z-10"></div>
            </div>
            
            <div class="px-4 sm:px-5 pb-5 relative z-20">
              <div class="inline-block px-2 py-0.5 border border-slate-500 rounded text-[10px] tracking-widest mb-3 text-slate-300 bg-slate-900/50 backdrop-blur-sm">${res.attr}</div>
              <h1 class="text-xl sm:text-2xl font-black text-slate-100 mb-4 leading-tight">${res.title}</h1>
              
              <div class="bg-slate-950/80 p-3 rounded border border-slate-800 mb-4">
                 ${statBar('力量 STR', res.stats.str, res.barColor)}
                 ${statBar('敏捷 AGI', res.stats.agi, res.barColor)}
                 ${statBar('智力 INT', res.stats.int, res.barColor)}
                 ${statBar('專注 FOC', res.stats.focus, res.barColor)}
              </div>

              <p class="text-slate-300 text-xs sm:text-sm leading-relaxed mb-2 text-justify">
                ${res.description}
              </p>
            </div>
          </div>
        </div>

        <div class="w-full px-2" style="max-width: 380px;">
          <div class="bg-slate-800 border border-slate-600 rounded-lg p-4 sm:p-5 shadow-lg relative overflow-hidden mb-6">
             <h3 class="font-bold text-amber-400 mb-2 flex items-center gap-2 text-sm tracking-wider">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
               尋找命定隊友
             </h3>
             <p class="text-slate-300 text-xs sm:text-sm leading-relaxed mb-4">
               你的靈魂最需要 <span class="${partnerRes.style} font-bold px-1 rounded-sm">${partnerRes.class}</span> 的輔助。
             </p>
             <button id="share-btn" onclick="generateShareLink()" class="w-full bg-slate-700 hover:bg-slate-600 active:bg-slate-600 border border-slate-500 text-slate-200 font-bold py-3 transition-all flex items-center justify-center gap-2 tracking-widest text-sm rounded outline-none">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
               複製招募連結
             </button>
          </div>

          <div class="bg-slate-800 border border-slate-600 rounded-lg p-4 sm:p-5 shadow-lg relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full ${res.btn}"></div>
            <div class="flex items-center justify-between mb-2">
              <h3 class="font-bold text-slate-200 flex items-center gap-2 text-sm tracking-wider">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${res.style}"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                專屬任務憑證
              </h3>
            </div>
            
            <p class="text-[11px] sm:text-xs text-amber-400 mb-3 tracking-wide leading-relaxed">
              ✨ 抵達桃園後，向店家出示此畫面領取
            </p>

            <div class="bg-slate-900 p-3 sm:p-4 border-2 border-dashed border-slate-600 text-slate-200 text-xs sm:text-sm font-bold mb-4 text-center relative overflow-hidden rounded-md flex flex-col items-center justify-center">
              <div class="absolute -left-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-slate-800 rounded-full border-r-2 border-slate-600"></div>
              <div class="absolute -right-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-slate-800 rounded-full border-l-2 border-slate-600"></div>
              
              <span class="relative z-10 block px-4 break-words w-full">${res.action}</span>
              
              <div class="mt-3 opacity-30 flex justify-center w-full max-w-[80%] overflow-hidden">
                <div class="h-5 sm:h-6 border-x-[3px] border-l-[6px] border-r-[2px] border-current border-solid flex justify-around gap-[2px] w-full max-w-[150px] shrink-0">
                  <div class="w-[2px] bg-current h-full"></div>
                  <div class="w-[4px] bg-current h-full"></div>
                  <div class="w-[1px] bg-current h-full"></div>
                  <div class="w-[3px] bg-current h-full"></div>
                  <div class="w-[5px] bg-current h-full"></div>
                  <div class="w-[2px] bg-current h-full"></div>
                  <div class="w-[1px] bg-current h-full"></div>
                  <div class="w-[4px] bg-current h-full"></div>
                </div>
              </div>
            </div>
            
            <button onclick="window.open('${res.mapUrl}', '_blank')" class="w-full ${res.btn} border border-transparent text-white font-bold py-3 transition-all flex items-center justify-center gap-2 tracking-widest text-sm mb-3 rounded outline-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              開啟地圖導航
            </button>
            
            <button id="download-btn" onclick="downloadCard()" class="w-full bg-transparent border border-slate-600 text-slate-400 font-bold py-3 hover:bg-slate-700 active:bg-slate-700 hover:text-slate-200 transition-all flex items-center justify-center gap-2 tracking-widest text-sm rounded outline-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
              下載角色卡
            </button>
          </div>
          
          <div class="text-center mt-8 pb-4">
            <button onclick="handleStart()" class="text-slate-500 text-xs sm:text-sm hover:text-slate-300 transition-colors tracking-widest outline-none py-2 px-4">
              [ 重新進行屬性鑑定 ]
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function render() {
    if (step === 0) {
      renderLanding();
    } else if (step > 0 && step <= questions.length) {
      renderQuestion();
    }
  }

  window.onload = () => { 
    history.replaceState(null, '', window.location.href);
    render(); 
  };
</script>
</head>
<body class="bg-slate-950 text-slate-200 antialiased font-sans selection:bg-amber-500/30">
  <div class="scanlines"></div>
  
  <button id="mute-btn" onclick="toggleMute()" class="fixed top-4 right-4 z-[100] p-2.5 bg-slate-800/80 rounded-full border border-slate-600 text-slate-300 hover:text-amber-400 hover:border-amber-500 transition-all backdrop-blur-sm shadow-lg outline-none">
    <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      <path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>
    </svg>
  </button>

  <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[150] flex flex-col gap-3 pointer-events-none items-center w-full max-w-sm px-4"></div>

  <div id="custom-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-slate-950/80 backdrop-blur-sm px-4">
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-lg max-w-sm w-full shadow-2xl">
      <h3 id="modal-title" class="text-lg font-bold text-amber-500 mb-2"></h3>
      <p id="modal-desc" class="text-slate-300 text-sm mb-6"></p>
      <div class="flex gap-3 justify-end">
        <button id="modal-cancel" class="px-4 py-2 text-sm text-slate-400 hover:text-slate-200 transition-colors outline-none">取消</button>
        <button id="modal-confirm" class="px-4 py-2 text-sm bg-slate-800 border border-slate-600 text-slate-200 rounded hover:bg-slate-700 hover:border-amber-500 transition-all outline-none">確定</button>

  <div id="app"></div>
