  button {

  .floating-shape {

    border-radius: 50%;
    filter: blur(60px);

<script type="module">

  const firebaseConfig = {
    apiKey: "AIzaSyBKyot66D6v2RLOts2qgFD0JAwin7undac",
    authDomain: "taoyuan-impact.firebaseapp.com",
    projectId: "taoyuan-impact",

    messagingSenderId: "304231338614",
    appId: "1:304231338614:web:d3eaf1e19699f67c0f8557"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToFirebase = async (data) => {
    try {
      await addDoc(collection(db, "quests"), data);
    } catch (error) {}

</script>

      stats: { str: 50, agi: 50, int: 95, focus: 80 },

      action: "接取任務：前往八德埤塘公園或循環基地體驗",
      style: "card-glow-tech text-cyan-600", btn: "bg-cyan-500 hover:bg-cyan-600 text-white shadow-md shadow-cyan-200",
      barColor: "bg-cyan-400",
      imgUrl: "assets/images/tech.jpg",

      partner: "indigenous"

  const bgmAudios = {
    coastal: new Audio('assets/audio/coastal.mp3'),
    urban: new Audio('assets/audio/urban.mp3'),
    foothill: new Audio('assets/audio/foothill.mp3'),
    indigenous: new Audio('assets/audio/indigenous.mp3'),
    tech: new Audio('assets/audio/tech.mp3')
  };
  
  Object.values(bgmAudios).forEach(audio => audio.loop = true);

  let step = 0;
  let scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
  let finalResult = null;
  let isMuted = false;
  let audioUnlocked = false;
  let calcInterval = null;
  let isProcessing = false;

  let userData = {
    userId: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2),
    answers: [],
    result: null,
    timestamp: null
  };

  function showToast(msg) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'bg-teal-600 text-white px-6 py-3 rounded-full shadow-lg font-bold text-sm tracking-widest fade-in pointer-events-auto border border-teal-500/50';
    toast.innerHTML = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(-10px)';
      toast.style.transition = 'all 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    Object.values(bgmAudios).forEach(audio => {
      audio.volume = 0;
      audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 1;
      }).catch(() => {});
    });
    audioUnlocked = true;
  }

  function toggleMute() {
    isMuted = !isMuted;
    const btnIcon = document.getElementById('mute-icon');
    
    if (isMuted) {
      Object.values(bgmAudios).forEach(audio => audio.pause());
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
    } else {
      if (finalResult && step > questions.length && bgmAudios[finalResult]) {
        bgmAudios[finalResult].play().catch(() => {});
      }
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>`;
    }
  }

  function playSound(type) {
    Object.values(bgmAudios).forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });
    if (bgmAudios[type] && !isMuted) {
      bgmAudios[type].play().catch(() => {});
    }
  }

  function showModal(title, desc, confirmCallback) {
    const modal = document.getElementById('custom-modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    modal.classList.remove('hidden');
    
    document.getElementById('modal-confirm').onclick = () => {
      modal.classList.add('hidden');
      confirmCallback();
    };
    document.getElementById('modal-cancel').onclick = () => {
      modal.classList.add('hidden');
      history.pushState(null, '', window.location.href);
    };
  }

  window.addEventListener('popstate', (e) => {
    if (step > 0 && step <= questions.length) {
      showModal('確定終止探索嗎？', '目前收集到的星芒碎片將會遺失。', () => {
        step = 0;
        userData.answers = [];
        scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
        render();
      });
    } else {
      history.pushState(null, '', window.location.href);
    }
  });

  function handleStart() {
    unlockAudio();
    history.pushState(null, '', window.location.href);
    const app = document.getElementById('app');
    window.scrollTo(0, 0);
    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center p-6 text-center fade-in w-full max-w-md mx-auto">
        <div class="text-teal-500 mb-6 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </div>
        <h2 class="text-xl font-bold tracking-widest text-teal-900 mb-2">凝聚星芒碎片</h2>
        <p class="text-teal-600/70 text-sm">正在同步水文脈絡...</p>
      </div>
    `;
    
    setTimeout(() => {
      step = 1;
      userData.answers = [];
      scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
      render();
    }, 1500);
  }

  function handleAnswer(type) {
    if (isProcessing) return;
    isProcessing = true;
    scores[type]++;
    userData.answers.push(type);
    
    if (step < questions.length) {
      step++;
      render();
      setTimeout(() => { isProcessing = false; }, 300);
    } else {
      calculateResult();
    }
  }

  function calculateResult() {
    let maxScore = -1;
    let possibleTypes = [];
    
    ['coastal', 'urban', 'foothill', 'indigenous', 'tech'].forEach(type => {
      if (scores[type] > maxScore) {
        maxScore = scores[type];
        possibleTypes = [type];
      } else if (scores[type] === maxScore) {
        possibleTypes.push(type);
      }
    });

    finalResult = possibleTypes[Math.floor(Math.random() * possibleTypes.length)];
    userData.result = results[finalResult].class;
    userData.timestamp = new Date().toISOString();
    
    if (window.saveToFirebase) {
      window.saveToFirebase(userData);
    }
    
    step = questions.length + 1;
    renderCalculating();
    
    setTimeout(() => {
      if (calcInterval) clearInterval(calcInterval);
      renderResult();
      playSound(finalResult);
      isProcessing = false;
    }, 2500);
  }

  function downloadCard() {
    const btn = document.getElementById('download-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-teal-600 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 星芒結印中...`;

    const cardWrap = document.getElementById('character-card-export-wrap');

    document.fonts.ready.then(() => {
      setTimeout(() => {
        html2canvas(cardWrap, {
          scale: 2,
          backgroundColor: '#f4fbf8',
          useCORS: true,
          logging: false
        }).then(canvas => {
          const link = document.createElement('a');
          link.download = `拾光桃園_${results[finalResult].class}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          btn.innerHTML = originalText;
        }).catch(err => {
          btn.innerHTML = originalText;
          showToast('下載失敗，請稍後再試。');
        });
      }, 300);
    });
  }

  function generateShareLink() {
    const baseUrl = window.location.href.split('?')[0];
    const needType = results[finalResult].partner;
    const shareUrl = `${baseUrl}?need=${needType}`;
    
    if (navigator.share) {
      navigator.share({ title: '拾光桃園十三隅星芒', url: shareUrl }).catch(() => {});
    } else {
      const el = document.createElement('textarea');
      el.value = shareUrl;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      showToast('成功複製專屬招募連結！');
    }
  }

  function renderQuestion() {
    window.scrollTo(0, 0);
    const app = document.getElementById('app');
    const q = questions[step - 1];
    
    let optionsHtml = q.options.map(opt => `
      <button onclick="handleAnswer('${opt.type}')" class="text-left w-full p-4 glass-panel hover:bg-white/90 active:bg-white/50 transition-all active:scale-[0.98] group relative overflow-hidden outline-none flex items-start border border-teal-100/50">
        <div class="absolute inset-0 bg-gradient-to-r from-teal-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <div class="flex-shrink-0 mt-0.5 mr-3 relative z-10">
          <svg class="w-5 h-5 text-teal-300 group-hover:text-teal-500 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <span class="text-teal-900 font-medium leading-relaxed relative z-10 flex-1 font-sans">
          ${opt.text}
        </span>
      </button>
    `).join('');

    app.innerHTML = `
      <div class="flex-1 flex flex-col p-4 sm:p-6 fade-in w-full max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6 pt-4 shrink-0 font-sans">
          <span class="text-sm font-bold text-teal-600 tracking-widest">STAGE ${step} / ${questions.length}</span>
          <div class="flex gap-1.5">
            ${Array.from({length: questions.length}).map((_, i) => `<div class="h-1.5 w-4 rounded-full ${i < step ? 'bg-teal-500 shadow-sm shadow-teal-300' : 'bg-teal-100'}"></div>`).join('')}
          </div>
        </div>
        
        <div class="flex-1 flex flex-col justify-start pt-2 pb-8">
          <div class="mb-8 px-2">
            <h2 class="text-xl sm:text-2xl font-bold text-teal-950 leading-relaxed">${q.title}</h2>
          </div>
          <div class="flex flex-col gap-3 sm:gap-4">
            ${optionsHtml}
          </div>
        </div>
      </div>
    `;
  }

  function renderCalculating() {
    window.scrollTo(0, 0);
    const app = document.getElementById('app');
    const flavorTexts = ["讀取水文脈絡...", "共鳴在地頻率...", "凝聚十三隅光芒...", "鑄造專屬憑證..."];
    let textIdx = 0;
    
    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center p-6 text-center fade-in w-full max-w-md mx-auto">
        <div class="relative w-20 h-20 mb-8">
          <div class="absolute inset-0 border-4 border-teal-100 rounded-full"></div>
          <div class="absolute inset-0 border-4 border-teal-500 rounded-full border-t-transparent animate-spin"></div>
          <svg class="absolute inset-0 m-auto text-teal-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </div>
        <h2 class="text-xl font-bold tracking-widest text-teal-900 mb-3">正在分析靈魂屬性</h2>
        <p id="calc-text" class="text-teal-600 text-sm tracking-widest font-bold h-5 font-sans">${flavorTexts[0]}</p>
      </div>
    `;

    calcInterval = setInterval(() => {
      textIdx = (textIdx + 1) % flavorTexts.length;
      const el = document.getElementById('calc-text');
      if(el) el.innerText = flavorTexts[textIdx];
    }, 600);
  }

  function renderResult() {
    window.scrollTo(0, 0);
    const res = results[finalResult];
    const partnerRes = results[res.partner];
    const app = document.getElementById('app');
    
    const statBar = (label, val, colorClass) => `
      <div class="flex items-center gap-3 text-xs mb-2 font-sans">
        <span class="text-teal-700 font-medium w-16 text-right flex-shrink-0">${label}</span>
        <div class="flex-1 h-2 bg-teal-50 rounded-full relative overflow-hidden border border-teal-100">
          <div class="absolute top-0 left-0 h-full ${colorClass} rounded-full" style="width: ${val}%"></div>
        </div>
        <span class="text-teal-800 font-bold w-6 text-right flex-shrink-0">${val}</span>
      </div>
    `;

    app.innerHTML = `
      <div class="flex-1 py-8 sm:py-10 px-4 fade-in flex flex-col items-center w-full mx-auto">
        <p class="text-teal-600 text-xs tracking-widest mb-4 font-sans font-bold">CHARACTER UNLOCKED</p>
        
        <div id="character-card-export-wrap" class="w-full p-2 sm:p-4 mb-4 flex justify-center" style="max-width: 400px;">
          <div id="character-card-export" class="w-full ${res.style} bg-white/90 backdrop-blur-md rounded-2xl overflow-hidden relative mx-auto">
            <div class="w-full aspect-[16/9] sm:h-48 bg-teal-50 relative flex items-center justify-center overflow-hidden">
                <img src="${res.imgUrl}" alt="${res.class}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmMGZkZjQiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1zaXplPSIyNCIgZmlsbD0iIzEzNGU0YSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj7ogbfkurrlvbHlg488L3RleHQ+PC9zdmc+'" class="absolute inset-0 w-full h-full object-cover z-0" crossorigin="anonymous" />
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/40 to-transparent z-10"></div>
            </div>
            
            <div class="px-5 sm:px-6 pb-6 pt-2 relative z-20">
              <div class="inline-block px-3 py-1 bg-teal-50 border border-teal-200 rounded-full text-[10px] tracking-widest mb-3 text-teal-700 font-sans font-bold">${res.attr}</div>
              <h1 class="text-2xl sm:text-3xl font-black text-teal-950 mb-5 leading-tight">${res.title}</h1>
              
              <div class="bg-white/60 p-4 rounded-xl border border-teal-50 mb-5 shadow-sm">
                 ${statBar('行動 STR', res.stats.str, res.barColor)}
                 ${statBar('彈性 AGI', res.stats.agi, res.barColor)}
                 ${statBar('洞察 INT', res.stats.int, res.barColor)}
                 ${statBar('共感 FOC', res.stats.focus, res.barColor)}
              </div>

              <p class="text-teal-800 text-sm leading-relaxed mb-2 text-justify font-sans">
                ${res.description}
              </p>
            </div>
          </div>
        </div>

        <div class="w-full px-2 font-sans" style="max-width: 380px;">
          <div class="glass-panel p-5 sm:p-6 relative overflow-hidden mb-6">
             <h3 class="font-bold text-teal-800 mb-2 flex items-center gap-2 text-sm tracking-wider">
               <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
               尋找命定隊友
             </h3>
             <p class="text-teal-700 text-sm leading-relaxed mb-4">
               你的靈魂最需要 <span class="bg-white px-2 py-0.5 rounded shadow-sm font-bold border border-teal-100">${partnerRes.class}</span> 的輔助。
             </p>
             <button id="share-btn" onclick="generateShareLink()" class="w-full bg-white hover:bg-teal-50 border border-teal-200 text-teal-700 font-bold py-3 transition-all flex items-center justify-center gap-2 tracking-widest text-sm rounded-xl outline-none shadow-sm">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
               複製招募連結
             </button>
          </div>

          <div class="glass-panel p-5 sm:p-6 relative overflow-hidden">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-bold text-teal-900 flex items-center gap-2 text-base tracking-wider">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                專屬任務憑證
              </h3>
            </div>
            
            <p class="text-xs text-teal-600 mb-4 tracking-wide leading-relaxed">
              ✨ 抵達指定行政區後，向合作店家出示此畫面領取
            </p>

            <div class="bg-white/80 p-4 border border-dashed border-teal-300 text-teal-900 text-sm font-bold mb-5 text-center relative overflow-hidden rounded-xl flex flex-col items-center justify-center shadow-inner">
              <span class="relative z-10 block px-2 break-words w-full">${res.action}</span>
            </div>
            
            <button onclick="window.open('${res.mapUrl}', '_blank')" class="w-full ${res.btn} font-bold py-3.5 transition-all flex items-center justify-center gap-2 tracking-widest text-sm mb-3 rounded-xl outline-none border border-transparent">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              開啟地圖導航
            </button>
            
            <button id="download-btn" onclick="downloadCard()" class="w-full bg-white border border-teal-200 text-teal-600 font-bold py-3.5 hover:bg-teal-50 transition-all flex items-center justify-center gap-2 tracking-widest text-sm rounded-xl outline-none shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
              下載專屬星芒卡
            </button>
          </div>
          
          <div class="text-center mt-10 pb-6">
            <button onclick="handleStart()" class="text-teal-500 text-sm hover:text-teal-700 transition-colors tracking-widest outline-none py-2 px-4 font-bold border-b border-teal-200 pb-1">
              重新凝聚星芒
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function render() {
    if (step === 0) {
      renderLanding();
    } else if (step > 0 && step <= questions.length) {
      renderQuestion();
    }
  }

  window.onload = () => { 
    history.replaceState(null, '', window.location.href);
    render(); 
  };
</script>
</head>
<body>
  <div class="floating-shape bg-teal-200/50 w-96 h-96 top-[-10%] left-[-10%]"></div>
  <div class="floating-shape bg-cyan-200/40 w-80 h-80 bottom-[-5%] right-[-5%]"></div>
  
  <button id="mute-btn" onclick="toggleMute()" class="fixed top-4 right-4 z-[100] p-2.5 bg-white/80 rounded-full border border-teal-100 text-teal-600 hover:text-teal-800 hover:border-teal-300 transition-all backdrop-blur-md shadow-sm outline-none">
    <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      <path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>
    </svg>
  </button>

  <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[150] flex flex-col gap-3 pointer-events-none items-center w-full max-w-sm px-4"></div>

  <div id="custom-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-teal-950/40 backdrop-blur-sm px-4 font-sans">
    <div class="bg-white border border-teal-100 p-6 rounded-2xl max-w-sm w-full shadow-2xl">
      <h3 id="modal-title" class="text-lg font-bold text-teal-800 mb-2"></h3>
      <p id="modal-desc" class="text-teal-600 text-sm mb-6"></p>
      <div class="flex gap-3 justify-end">
        <button id="modal-cancel" class="px-4 py-2.5 text-sm text-teal-500 hover:text-teal-700 transition-colors outline-none font-bold">取消</button>
        <button id="modal-confirm" class="px-5 py-2.5 text-sm bg-teal-600 text-white rounded-xl hover:bg-teal-500 transition-all outline-none font-bold shadow-sm">確定</button>
      </div>
    </div>
  </div>

  <div id="app"></div>
</body>
</html>
