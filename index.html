  body {

    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    overscroll-behavior-y: none;

    min-height: 100vh;

  .glass-panel {
    background: rgba(15, 23, 42, 0.6);

    border: 1px solid rgba(168, 85, 247, 0.25);

  .card-glow-urban { box-shadow: 0 8px 30px rgba(168, 85, 247, 0.25); border: 2px solid #c084fc; }

  .card-glow-indigenous { box-shadow: 0 8px 30px rgba(16, 185, 129, 0.25); border: 2px solid #34d399; }
  .card-glow-tech { box-shadow: 0 8px 30px rgba(6, 182, 212, 0.25); border: 2px solid #22d3ee; }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  .floating-shape {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKyot66D6v2RLOts2qgFD0JAwin7undac",
    authDomain: "taoyuan-impact.firebaseapp.com",
    projectId: "taoyuan-impact",
    storageBucket: "taoyuan-impact.firebasestorage.app",
    messagingSenderId: "304231338614",
    appId: "1:304231338614:web:d3eaf1e19699f67c0f8557"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToFirebase = async (data) => {
    try {
      await addDoc(collection(db, "quests"), data);
    } catch (error) {}
  };
</script>

<script>

  const results = {
    coastal: {
      class: "濱海巡浪者", title: "守護海洋的巡浪者", attr: "環境 / 倡議 / 蔚藍",

      action: "風格活動：前往新屋海岸進行綠色走讀與海廢創作體驗",
      style: "card-glow-coastal text-sky-400", btn: "bg-sky-600 hover:bg-sky-500 text-white shadow-md shadow-sky-900/50",

      style: "card-glow-urban text-fuchsia-400", btn: "bg-fuchsia-600 hover:bg-fuchsia-500 text-white shadow-md shadow-fuchsia-900/50",

    },
    foothill: {
      class: "淺山記憶紡梭", title: "傳承歷史的記憶紡梭", attr: "文創 / 傳承 / 溫潤",
      stats: { str: 30, agi: 40, int: 90, focus: 95 },
      description: "你體內流淌著對歷史溫度的敏銳感知，總能從老故事中翻轉出新意。大溪、龍潭與楊梅的老街區正等待你注入活水，延續地方生命力。",

      style: "card-glow-indigenous text-emerald-400", btn: "bg-emerald-600 hover:bg-emerald-500 text-white shadow-md shadow-emerald-900/50",
      barColor: "bg-emerald-400",

      partner: "coastal"
    },
    tech: {
      class: "埤塘循環創客", title: "再造價值的循環創客", attr: "科技 / 循環 / 創新",
      stats: { str: 50, agi: 50, int: 95, focus: 80 },
      description: "你具備洞察問題的雙眼，能將看似無用或被遺棄的事物，透過低碳科技轉化為全新的創意解方，實踐在八德等地的再生基地中。",
      action: "風格活動：前往八德埤塘公園參加永續野餐與循環手作",
      style: "card-glow-tech text-cyan-400", btn: "bg-cyan-600 hover:bg-cyan-500 text-white shadow-md shadow-cyan-900/50",
      barColor: "bg-cyan-400",
      imgUrl: "assets/images/tech.png",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=八德埤塘自然生態公園",
      partner: "indigenous"
    }
  };

  const bgmAudios = {
    coastal: new Audio('assets/audio/coastal.mp3'),
    urban: new Audio('assets/audio/urban.mp3'),
    foothill: new Audio('assets/audio/foothill.mp3'),
    indigenous: new Audio('assets/audio/indigenous.mp3'),
    tech: new Audio('assets/audio/tech.mp3')
  };
  
  Object.values(bgmAudios).forEach(audio => audio.loop = true);

  let step = 0;
  let scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
  let finalResult = null;
  let isMuted = false;
  let audioUnlocked = false;
  let calcInterval = null;
  let isProcessing = false;

  let userData = {
    userId: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2),
    answers: [],
    result: null,
    timestamp: null
  };

  function showToast(msg) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'bg-slate-900/90 text-purple-300 px-6 py-3.5 rounded-full shadow-lg font-bold text-sm tracking-widest fade-in pointer-events-auto border border-purple-500/30';
    toast.innerHTML = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(-10px)';
      toast.style.transition = 'all 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    Object.values(bgmAudios).forEach(audio => {
      audio.volume = 0;
      audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 1;
      }).catch(() => {});
    });
    audioUnlocked = true;
  }

  function toggleMute() {
    isMuted = !isMuted;
    const btnIcon = document.getElementById('mute-icon');
    
    if (isMuted) {
      Object.values(bgmAudios).forEach(audio => audio.pause());
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
    } else {
      if (finalResult && step > questions.length && bgmAudios[finalResult]) {
        bgmAudios[finalResult].play().catch(() => {});
      }
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>`;
    }
  }

  function playSound(type) {
    Object.values(bgmAudios).forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });
    if (bgmAudios[type] && !isMuted) {
      bgmAudios[type].play().catch(() => {});
    }
  }

  function showModal(title, desc, confirmCallback) {
    const modal = document.getElementById('custom-modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    modal.classList.remove('hidden');
    
    document.getElementById('modal-confirm').onclick = () => {
      modal.classList.add('hidden');
      confirmCallback();
    };
    document.getElementById('modal-cancel').onclick = () => {
      modal.classList.add('hidden');
      history.pushState(null, '', window.location.href);
    };
  }

  window.addEventListener('popstate', (e) => {
    if (step > 0 && step <= questions.length) {
      showModal('確定終止探索嗎？', '目前收集到的星芒碎片將會遺失。', () => {
        step = 0;
        userData.answers = [];
        scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
        render();
      });
    } else {
      history.pushState(null, '', window.location.href);
    }
  });

  function handleStart() {
    unlockAudio();
    history.pushState(null, '', window.location.href);
    const app = document.getElementById('app');
    window.scrollTo(0, 0);
    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center p-6 text-center fade-in w-full max-w-md mx-auto">
        <div class="text-purple-400 mb-6 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </div>
        <h2 class="text-xl font-bold tracking-widest text-slate-100 mb-2">凝聚星芒碎片</h2>
        <p class="text-purple-300/70 text-sm font-sans">正在同步水文脈絡...</p>
      </div>
    `;
    
    setTimeout(() => {
      step = 1;
      userData.answers = [];
      scores = { coastal: 0, urban: 0, foothill: 0, indigenous: 0, tech: 0 };
      render();
    }, 1500);
  }

  function handleAnswer(type) {
    if (isProcessing) return;
    isProcessing = true;
    scores[type]++;
    userData.answers.push(type);
    
    if (step < questions.length) {
      step++;
      render();
      setTimeout(() => { isProcessing = false; }, 300);
    } else {
      calculateResult();
    }
  }

  function calculateResult() {
    let maxScore = -1;
    let possibleTypes = [];
    
    ['coastal', 'urban', 'foothill', 'indigenous', 'tech'].forEach(type => {
      if (scores[type] > maxScore) {
        maxScore = scores[type];
        possibleTypes = [type];
      } else if (scores[type] === maxScore) {
        possibleTypes.push(type);
      }
    });

    finalResult = possibleTypes[Math.floor(Math.random() * possibleTypes.length)];
    userData.result = results[finalResult].class;
    userData.timestamp = new Date().toISOString();
    
    if (window.saveToFirebase) {
      window.saveToFirebase(userData);
    }
    
    step = questions.length + 1;
    renderCalculating();
    
    setTimeout(() => {
      if (calcInterval) clearInterval(calcInterval);
      renderResult();
      playSound(finalResult);
      isProcessing = false;
    }, 2500);
  }

  function downloadCard() {
    const btn = document.getElementById('download-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-purple-400 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 星芒結印中...`;

    const cardWrap = document.getElementById('character-card-export-wrap');

    document.fonts.ready.then(() => {
      setTimeout(() => {
        html2canvas(cardWrap, {
          scale: 2,
          backgroundColor: '#0b0f19',
          useCORS: true,
          logging: false
        }).then(canvas => {
          const link = document.createElement('a');
          link.download = `拾光桃園_${results[finalResult].class}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          btn.innerHTML = originalText;
        }).catch(err => {
          btn.innerHTML = originalText;
          showToast('下載失敗，請稍後再試。');
        });
      }, 300);
    });
  }

  function generateShareLink() {
    const baseUrl = window.location.href.split('?')[0];
    const needType = results[finalResult].partner;
    const shareUrl = `${baseUrl}?need=${needType}`;
    
    if (navigator.share) {
      navigator.share({ title: '拾光桃園十三隅星芒', url: shareUrl }).catch(() => {});
    } else {
      const el = document.createElement('textarea');
      el.value = shareUrl;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      showToast('成功複製專屬招募連結！');
    }
  }

    `;

        subtitleHtml = `

          在桃園，你最適合哪種生活提案？<br/>
          探尋你的隱藏屬性，解鎖專屬的週末永續走讀。
        `;
    }

    app.innerHTML = `
      <div class="flex-1 flex flex-col items-center justify-center md:justify-start md:pt-20 lg:pt-28 p-6 fade-in w-full">
        <div class="text-center max-w-md w-full glass-panel p-8 md:p-10 mx-auto">
          <p class="text-xs text-purple-400/85 tracking-widest mb-3 font-sans font-bold">TAOYUAN LIFE PROJECT</p>
          <h1 class="text-4xl sm:text-5xl font-black text-slate-100 mb-2 leading-tight drop-shadow-md">
            拾光桃園<br/>
            <span class="text-purple-400 text-3xl sm:text-4xl mt-3 block font-bold">十三隅星芒</span>
          </h1>
          
          <div class="my-6 sm:my-8 h-px bg-gradient-to-r from-transparent via-purple-500/30 to-transparent"></div>
          
          <p class="text-slate-300 mb-8 leading-relaxed text-sm sm:text-base font-sans font-medium">
            ${subtitleHtml}
          </p>
          
          <div class="flex justify-center w-full">
