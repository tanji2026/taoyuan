<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光桃園 - 尤努斯獎計畫書封面產生器</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: #0f172a; 
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        
        .font-serif-tc { font-family: 'Noto Serif TC', serif; }

        .a4-canvas {
            position: relative;
            width: 210mm;
            height: 297mm;
            background: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 50%, #090d16 100%);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            text-align: center;
        }

        #poster-cover {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform-origin: top center;
        }

        .bg-texture {
            background-image: 
                radial-gradient(rgba(168, 85, 247, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0) 60%, rgba(11, 15, 25, 0.5) 100%);
            background-size: 50px 50px, 100% 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.9;
            pointer-events: none;
        }

        .lavender-glow {
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5), 0 0 40px rgba(168, 85, 247, 0.25);
        }

        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                display: block;
            }
            .control-panel { display: none !important; }
            #poster-cover {
                transform: none !important;
                box-shadow: none !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col xl:flex-row gap-8 justify-center items-start">

    <div class="control-panel w-full xl:w-[400px] bg-slate-900/90 backdrop-blur-md p-6 rounded-3xl border border-purple-900/30 shadow-2xl flex flex-col gap-6 sticky top-8 z-50">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="crown" class="text-purple-400 w-5 h-5"></i>
                <h1 class="text-xl font-bold text-slate-100 font-serif-tc">尤努斯獎計畫書封面</h1>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed">內建防位移渲染分身。十三隅星芒星象圖已調整至極簡平衡、幾何對稱狀態。</p>
        </div>

        <div class="h-px bg-purple-500/10"></div>

        <div class="flex flex-col gap-4">
            <div>
                <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">主辦競賽名稱</label>
                <input id="in-contest" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="2026 桃園社會企業創業競賽暨第十一屆尤努斯奬">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">組別分類</label>
                    <input id="in-group" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="【社會影響力組】">
                </div>
                <div>
                    <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">文件名稱</label>
                    <input id="in-doc" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="初賽計畫書">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">計畫主題（大標題）</label>
                <input id="in-title" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="拾光桃園：十三隅星芒">
            </div>

            <div>
                <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">計畫副標題</label>
                <textarea id="in-subtitle" rows="2" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50 resize-none">融合地方永續特質與風格探索的青年走讀平台</textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">提案團隊</label>
                    <input id="in-team" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="碳吉 TanJi">
                </div>
                <div>
                    <label class="block text-xs font-bold text-purple-300 tracking-wider mb-2">提案時間</label>
                    <input id="in-date" type="text" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50" value="中華民國 115 年 6 月">
                </div>
            </div>
        </div>

        <div class="h-px bg-purple-500/10"></div>

        <div class="flex flex-col gap-3">
            <button onclick="downloadCover()" id="downloadBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(168,85,247,0.3)] hover:shadow-[0_0_25px_rgba(168,85,247,0.5)] flex items-center justify-center gap-2 text-sm">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span>下載 A4 高畫質圖 (PNG)</span>
            </button>
            <button onclick="window.print()" class="w-full bg-slate-800/80 hover:bg-slate-700 text-slate-300 font-bold py-3.5 rounded-xl border border-slate-700 transition-all flex items-center justify-center gap-2 text-sm">
                <i data-lucide="printer" class="w-4 h-4"></i>
                <span>直接列印 / 輸出 PDF</span>
            </button>
        </div>
    </div>

    <div id="a4-wrapper" class="flex justify-center items-start flex-grow">
        <div class="a4-canvas" id="poster-cover">
            <div class="bg-texture"></div>
            
            <div class="absolute inset-0 p-[20mm] z-10 flex flex-col justify-between items-center">
                
                <div class="w-full block shrink-0">
                    <p id="lbl-contest" class="text-[14px] text-purple-300/80 tracking-[0.2em] font-medium mb-4">2026 桃園社會企業創業競賽暨第十一屆尤努斯奬</p>
                    <div class="inline-block px-4 py-1.5 bg-purple-950/40 border border-purple-500/30 rounded text-[16px] text-purple-300 font-bold tracking-[0.3em] uppercase">
                        <span id="lbl-group">【社會影響力組】</span>
                    </div>
                    <h2 id="lbl-doc" class="text-[28px] font-bold text-slate-100 tracking-[0.4em] mt-8 font-serif-tc pl-4">初賽計畫書</h2>
                </div>

                <div class="relative w-[300px] h-[300px] shrink-0 my-4 block">
                    <div class="absolute inset-[30px] bg-purple-600/10 rounded-full blur-[60px] pointer-events-none"></div>
                    
                    <svg viewBox="0 0 100 100" class="absolute top-[7.5px] left-[7.5px] w-[285px] h-[285px] opacity-40 pointer-events-none">
                        <circle cx="50" cy="50" r="48" fill="none" stroke="#a855f7" stroke-width="0.3" stroke-dasharray="1 2"/>
                        <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" stroke-width="0.4"/>
                        <circle cx="50" cy="50" r="25" fill="none" stroke="#a855f7" stroke-width="0.3"/>
                        <circle cx="50" cy="50" r="16" fill="none" stroke="#a855f7" stroke-width="0.4"/>
                        
                        <polygon points="50.00,8.00 69.52,12.81 84.57,26.14 91.69,44.95 89.27,64.89 77.85,81.44 60.05,90.78 39.95,90.78 22.15,81.44 10.73,64.89 8.31,44.95 15.43,26.14 30.48,12.81" fill="none" stroke="#64748b" stroke-width="0.3"/>
                        <polygon points="50.00,25.00 61.62,27.86 70.58,35.80 74.82,46.99 73.38,58.87 66.58,68.71 55.98,74.27 44.02,74.27 33.42,68.71 26.62,58.87 25.18,46.99 29.42,35.80 38.38,27.86" fill="none" stroke="#a855f7" stroke-width="0.2"/>

                        <line x1="50" y1="50" x2="50.00" y2="8.00" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="69.52" y2="12.81" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="84.57" y2="26.14" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="91.69" y2="44.95" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="89.27" y2="64.89" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="77.85" y2="81.44" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="60.05" y2="90.78" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="39.95" y2="90.78" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="22.15" y2="81.44" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="10.73" y2="64.89" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="8.31" y2="44.95" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="15.43" y2="26.14" stroke="#a855f7" stroke-width="0.3"/>
                        <line x1="50" y1="50" x2="30.48" y2="12.81" stroke="#a855f7" stroke-width="0.3"/>

                        <circle cx="50.00" cy="8.00" r="1.5" fill="#f8fafc" />
                        <circle cx="69.52" cy="12.81" r="1.5" fill="#f8fafc" />
                        <circle cx="84.57" cy="26.14" r="1.5" fill="#f8fafc" />
                        <circle cx="91.69" cy="44.95" r="1.5" fill="#f8fafc" />
                        <circle cx="89.27" cy="64.89" r="1.5" fill="#f8fafc" />
                        <circle cx="77.85" cy="81.44" r="1.5" fill="#f8fafc" />
                        <circle cx="60.05" cy="90.78" r="1.5" fill="#f8fafc" />
                        <circle cx="39.95" cy="90.78" r="1.5" fill="#f8fafc" />
                        <circle cx="22.15" cy="81.44" r="1.5" fill="#f8fafc" />
                        <circle cx="10.73" cy="64.89" r="1.5" fill="#f8fafc" />
                        <circle cx="8.31" cy="44.95" r="1.5" fill="#f8fafc" />
                        <circle cx="15.43" cy="26.14" r="1.5" fill="#f8fafc" />
                        <circle cx="30.48" cy="12.81" r="1.5" fill="#f8fafc" />
                    </svg>

                    <div class="absolute top-[90px] left-[70px] w-[160px] h-[120px] text-center flex flex-col items-center justify-center">
                        <i data-lucide="compass" style="width: 48px; height: 48px;" class="text-purple-400/80 mb-2"></i>
                        <span class="text-[12px] text-purple-300 font-mono tracking-[0.25em] pl-[0.25em]">TAOYUAN STAR</span>
                    </div>
                </div>

                <div class="w-full block shrink-0">
                    <h1 id="lbl-title" class="text-[44px] font-black leading-tight tracking-[0.1em] mb-4 font-serif-tc text-slate-100 lavender-glow">
                        拾光桃園：十三隅星芒
                    </h1>
                    <p id="lbl-subtitle" class="text-[16px] text-slate-300 max-w-[500px] mx-auto leading-relaxed tracking-[0.15em] font-light font-sans pl-2">
                        融合地方永續特質與風格探索的青年走讀平台
                    </p>
                </div>

                <div class="w-full border-t border-purple-500/20 pt-12 block shrink-0 flex flex-col items-center gap-1.5">
                    <div class="flex items-center justify-center gap-2">
                        <span class="text-[13px] text-purple-400/80 font-bold tracking-[0.2em]">提案團隊：</span>
                        <span id="lbl-team" class="text-[16px] text-slate-100 font-bold tracking-[0.2em]">碳吉 TanJi</span>
                    </div>
                    <p id="lbl-date" class="text-[12px] text-slate-400 font-medium tracking-[0.15em] mt-1">中華民國 115 年 6 月</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const inputs = {
            'in-contest': 'lbl-contest',
            'in-group': 'lbl-group',
            'in-doc': 'lbl-doc',
            'in-title': 'lbl-title',
            'in-subtitle': 'lbl-subtitle',
            'in-team': 'lbl-team',
            'in-date': 'lbl-date'
        };

        Object.keys(inputs).forEach(inputId => {
            const el = document.getElementById(inputId);
            el.addEventListener('input', (e) => {
                document.getElementById(inputs[inputId]).innerText = e.target.value;
            });
        });

        function resizePreview() {
            const wrapper = document.getElementById('a4-wrapper');
            const preview = document.getElementById('poster-cover');
            const windowHeight = window.innerHeight;
            const targetWidth = 794; 
            const targetHeight = 1123;
            
            const spaceNeededY = windowHeight - 120;
            const scaleY = spaceNeededY / targetHeight;
            
            if (window.innerWidth > 1024) {
                const scale = Math.min(scaleY, 1.0);
                preview.style.transform = `scale(${scale})`;
                wrapper.style.height = `${targetHeight * scale}px`;
                wrapper.style.width = `${targetWidth * scale}px`;
            } else {
                preview.style.transform = "scale(0.75)";
                wrapper.style.height = `${targetHeight * 0.75}px`;
                wrapper.style.width = "auto";
            }
        }

        async function downloadCover() {
            const btn = document.getElementById('downloadBtn');
            const originalContent = btn.innerHTML;
            const originalSource = document.getElementById('poster-cover');
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>精準像素對齊中...</span>';
            btn.disabled = true;
            lucide.createIcons(); 

            try {
                const sandbox = originalSource.cloneNode(true);
                sandbox.style.transform = 'none';
                sandbox.style.position = 'fixed';
                sandbox.style.top = '0';
                sandbox.style.left = '-9999px'; 
                document.body.appendChild(sandbox);

                await document.fonts.ready;
                await new Promise(resolve => setTimeout(resolve, 500));

                const canvas = await html2canvas(sandbox, {
                    scale: 2.0, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#0b0f19',
                    logging: false,
                    scrollX: 0,
                    scrollY: 0,
                    windowWidth: sandbox.offsetWidth,
                    windowHeight: sandbox.offsetHeight
                });

                document.body.removeChild(sandbox);

                const link = document.createElement('a');
                link.download = `拾光桃園_尤努斯計畫書封面_${document.getElementById('lbl-team').innerText}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
            } catch (error) {
                console.error("封面精準導出失敗:", error);
                alert("圖片渲染失敗，請確認是否遭跨域資源擋住。");
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
                resizePreview();
            }
        }

        window.addEventListener('resize', resizePreview);
        window.addEventListener('load', resizePreview);
        resizePreview();
    </script>
</body>
</html>
